<!DOCTYPE html>
<html>
<head>
	<title>Register Form</title>
</head>
<body>
<center><form method = "post" action = "InsertFormData.php">
	<table = border = "2">
		<tr>
			<td>Name</td>
			<td><input type = "text" name = "UserName" placeholder = "Please Enter User Name" required></td>
		</tr>
		<tr>
			<td>Password</td>
			<td><input type = "password" name = "Password" placeholder = "Please Enter Password" required></td>
		</tr>
		<tr>
			<td>Gender</td>
		</tr>
		<tr>
			<td>Male</td>
			<td><input type = "radio" name = "Gender" value = "Male"></td>
		</tr>
		<tr>
			<td>Female</td>
			<td><input type = "radio" name = "Gender" value = "Female"></td>
		</tr>
		<tr>
			<td>Education:</td>
		</tr>
		<tr>
			<td><input type = "checkbox" name = "Education[]" value = "SSC"></td>	
			<td>SSC</td>
		</tr>
		<tr>
			<td><input type = "checkbox" name = "Education[]" value = "HSSC"></td>	
			<td>HSSC</td>
		</tr>
		<tr>
			<td><input type = "checkbox" name = "Education[]" value = "BS"></td>	
			<td>BS</td>
		</tr>
		<tr>
			<td><input type = "submit" name = "Submit" value = "Submit"></td>		
		</tr>
	</table>
</form>
</center>
</body>
</html>
